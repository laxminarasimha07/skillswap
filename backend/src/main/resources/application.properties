spring.application.name=swapskill

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/skillswap?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=8081
Replace the database section with env vars
# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=averylongandsecuresecretkeythatisatleast256bitslong
jwt.expiration=86400000

# Google OAuth (set these via environment variables in production)
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirectUri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/oauth2/callback}

# Frontend URL for redirect after OAuth
app.frontendUrl=${APP_FRONTEND_URL:http://localhost:5173}

