spring.application.name=swapskill

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/skillswap?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
server.port=${PORT:8080}
# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=averylongandsecuresecretkeythatisatleast256bitslong
jwt.expiration=86400000

# Google OAuth (set these via environment variables in production)
google.clientId=${GOOGLE_CLIENT_ID}
google.clientSecret=${GOOGLE_CLIENT_SECRET}
google.redirectUri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/oauth2/callback}



# Frontend URL for redirect after OAuth
app.frontendUrl=${APP_FRONTEND_URL:http://localhost:5173}

